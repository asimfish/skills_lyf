# =============================================================================
# Scholar Demo: Lesson Plans Manifest
# Course: STAT-101 - Introduction to Statistical Methods
# =============================================================================
#
# This file is generated by /teaching:demo and copied into .flow/lesson-plans.yml.
# It defines the semester-wide lesson plan structure for the STAT-101 demo course.
#
# SECTIONS:
#   schema_version  - Manifest format version (currently "1.0")
#   semester        - Semester metadata: total weeks, schedule pattern, milestones
#   weeks           - Array of week-level lesson plan entries
#
# WEEK STATUS VALUES:
#   draft      - Minimal skeleton; only title and week number required
#   generated  - AI-generated content, ready for instructor review
#   reviewed   - Instructor has reviewed and approved (not shown in this demo)
#   published  - Finalized and distributed to students
#
# This demo includes 3 fully-detailed weeks to illustrate the manifest format:
#   Week 1 (published)  - Complete with all fields populated
#   Week 2 (generated)  - Complete content awaiting instructor review
#   Week 3 (draft)      - Minimal entry showing the starting skeleton
#
# Remaining weeks (4-15) map to the topics in teach-config.yml and would be
# populated as the semester progresses using /teaching:lecture.
# =============================================================================

schema_version: "1.0"

semester:
  total_weeks: 15
  schedule: "TR"
  milestones:
    - week: 8
      type: midterm
      label: "Midterm Exam"
    - week: 10
      type: break
      label: "Spring Break"
    - week: 16
      type: final
      label: "Final Exam"

weeks:
  # ===========================================================================
  # Week 1: Descriptive Statistics (status: published)
  # ---------------------------------------------------------------------------
  # This is a fully-detailed week entry showing every available field.
  # Published status means it has been finalized and shared with students.
  # ===========================================================================
  - week: 1
    title: "Descriptive Statistics"
    subtitle: "Summarizing and visualizing data with measures of center and spread"
    status: published
    date_range:
      start: "2026-01-20"
      end: "2026-01-22"

    learning_objectives:
      - id: "LO-1.1"
        level: understand
        description: "Distinguish between categorical and quantitative variables and identify appropriate summary measures for each type"
        assessment_method: "In-class practice worksheet"
      - id: "LO-1.2"
        level: apply
        description: "Calculate and interpret measures of central tendency (mean, median, mode) for real-world datasets"
        assessment_method: "Homework problems"
      - id: "LO-1.3"
        level: apply
        description: "Calculate and interpret measures of variability (range, IQR, variance, standard deviation) and explain what they reveal about data spread"
        assessment_method: "Homework problems"
      - id: "LO-1.4"
        level: analyze
        description: "Select and construct appropriate graphical displays (histogram, boxplot, bar chart) based on variable type and research question"
        assessment_method: "Lab activity"

    topics:
      - id: "T-1.1"
        name: "Types of Data"
        subtopics:
          - "Categorical vs. quantitative variables"
          - "Levels of measurement (nominal, ordinal, interval, ratio)"
          - "Population vs. sample"
      - id: "T-1.2"
        name: "Measures of Central Tendency"
        subtopics:
          - "Mean, median, and mode"
          - "When to use each measure"
          - "Effect of skewness on mean vs. median"
      - id: "T-1.3"
        name: "Measures of Variability"
        subtopics:
          - "Range and interquartile range (IQR)"
          - "Variance and standard deviation"
          - "Interpreting spread in context"
      - id: "T-1.4"
        name: "Data Visualization"
        subtopics:
          - "Histograms and frequency distributions"
          - "Boxplots and the five-number summary"
          - "Bar charts and pie charts for categorical data"

    materials:
      readings:
        - type: textbook
          title: "Introductory Statistics"
          authors:
            - "Openintro"
          chapter: "Chapter 1: Introduction to Data"
          pages: "1-42"
          required: true
          notes: "Focus on Sections 1.1-1.3 for variable types and summary statistics"
        - type: webpage
          title: "Choosing the Right Chart Type"
          url: "https://www.data-to-viz.com/"
          required: false
          notes: "Interactive reference for selecting visualizations"
      datasets:
        - name: "exam_scores"
          file: "data/exam-scores.csv"
          description: "Midterm exam scores from a previous STAT-101 section"
          size: "120 observations, 4 variables"
          source: "Simulated data"
      software:
        - name: "R"
          version: ">= 4.3.0"
          packages:
            - "ggplot2"
            - "dplyr"

    activities:
      - id: "A-1.1"
        type: think-pair-share
        title: "Variable Classification Challenge"
        duration_minutes: 10
        description: "Students classify 15 real-world variables as categorical/quantitative and identify the level of measurement. Share with a partner and resolve disagreements."
        learning_objectives:
          - "LO-1.1"
      - id: "A-1.2"
        type: in-class-practice
        title: "Summary Statistics by Hand"
        duration_minutes: 15
        description: "Given a small dataset of 10 exam scores, compute the mean, median, range, IQR, and standard deviation by hand. Compare results and discuss which summary best represents the data."
        learning_objectives:
          - "LO-1.2"
          - "LO-1.3"
      - id: "A-1.3"
        type: lab-activity
        title: "Visualizing Exam Score Distributions"
        duration_minutes: 20
        description: "Use R and ggplot2 to create histograms and boxplots of the exam_scores dataset. Experiment with bin widths and interpret the shape, center, and spread of the distribution."
        learning_objectives:
          - "LO-1.4"
        materials:
          - "exam_scores"

    assessments:
      - type: homework
        id: "HW-1"
        title: "Descriptive Statistics Practice"
        due_date: "2026-01-27"
        points: 20
        topics:
          - "T-1.1"
          - "T-1.2"
          - "T-1.3"
          - "T-1.4"
        learning_objectives:
          - "LO-1.1"
          - "LO-1.2"
          - "LO-1.3"
          - "LO-1.4"

    lecture_structure:
      - segment: introduction
        duration_minutes: 10
        content: "Course overview and why statistics matters; motivating example with real data"
        teaching_method: mini-lecture
      - segment: introduction
        duration_minutes: 10
        content: "Types of data and levels of measurement with everyday examples"
        teaching_method: mini-lecture
      - segment: practice
        duration_minutes: 10
        content: "Variable Classification Challenge (think-pair-share activity A-1.1)"
        teaching_method: think-pair-share
      - segment: introduction
        duration_minutes: 15
        content: "Measures of central tendency: definitions, formulas, and when each is appropriate"
        teaching_method: mini-lecture
      - segment: example
        duration_minutes: 10
        content: "Worked example: computing mean and median for a skewed dataset"
        teaching_method: instructor-demo
      - segment: practice
        duration_minutes: 15
        content: "Summary Statistics by Hand worksheet (activity A-1.2)"
        teaching_method: guided-practice
      - segment: break
        duration_minutes: 5
        content: "Short break"
      - segment: introduction
        duration_minutes: 10
        content: "Measures of variability: range, IQR, variance, and standard deviation"
        teaching_method: mini-lecture
      - segment: demonstration
        duration_minutes: 10
        content: "Live R demo: creating histograms and boxplots with ggplot2"
        teaching_method: instructor-demo
      - segment: practice
        duration_minutes: 20
        content: "Visualizing Exam Score Distributions lab (activity A-1.3)"
        teaching_method: guided-practice
      - segment: wrap-up
        duration_minutes: 10
        content: "Key takeaways, preview of next week on probability, homework overview"
        teaching_method: mini-lecture

    prerequisites:
      topics: []
      skills:
        - "Basic arithmetic"
        - "Familiarity with spreadsheets or calculators"

    prepares_for:
      topics:
        - "T-2.1"
        - "T-2.2"
      skills:
        - "Summarizing data distributions"
        - "Reading and interpreting graphical displays"

    metadata:
      created: "2026-01-15"
      updated: "2026-01-19"
      version: "1.0"
      author: "Dr. Jane Smith"
      status: published
      tags:
        - "descriptive-statistics"
        - "data-visualization"
        - "introductory"

  # ===========================================================================
  # Week 2: Probability Fundamentals (status: generated)
  # ---------------------------------------------------------------------------
  # This is a fully-detailed week entry with AI-generated content.
  # Generated status means it was produced by /teaching:lecture and is ready
  # for instructor review before being published.
  # ===========================================================================
  - week: 2
    title: "Probability Fundamentals"
    subtitle: "Rules of probability, conditional probability, and independence"
    status: generated
    date_range:
      start: "2026-01-27"
      end: "2026-01-29"

    learning_objectives:
      - id: "LO-2.1"
        level: understand
        description: "Define sample spaces and events, and use set notation to describe probability experiments"
        assessment_method: "Quiz questions"
      - id: "LO-2.2"
        level: apply
        description: "Apply the addition and multiplication rules to compute probabilities of compound events"
        assessment_method: "Homework problems"
      - id: "LO-2.3"
        level: apply
        description: "Calculate conditional probabilities and determine whether two events are independent"
        assessment_method: "Homework problems"
      - id: "LO-2.4"
        level: analyze
        description: "Construct and interpret two-way tables to analyze relationships between categorical variables"
        assessment_method: "In-class group activity"

    topics:
      - id: "T-2.1"
        name: "Sample Spaces and Events"
        prerequisites:
          - "T-1.1"
        subtopics:
          - "Defining the sample space"
          - "Simple and compound events"
          - "Complementary events"
      - id: "T-2.2"
        name: "Basic Probability Rules"
        prerequisites:
          - "T-1.1"
        subtopics:
          - "Addition rule for mutually exclusive events"
          - "General addition rule"
          - "Complement rule"
      - id: "T-2.3"
        name: "Conditional Probability and Independence"
        subtopics:
          - "Definition of conditional probability"
          - "Multiplication rule"
          - "Testing for independence"
      - id: "T-2.4"
        name: "Two-Way Tables and Probability"
        subtopics:
          - "Joint, marginal, and conditional distributions"
          - "Reading probabilities from tables"
          - "Simpson's paradox introduction"

    materials:
      readings:
        - type: textbook
          title: "Introductory Statistics"
          authors:
            - "Openintro"
          chapter: "Chapter 3: Probability"
          pages: "93-130"
          required: true
          notes: "Sections 3.1-3.3 cover the core rules; 3.4 covers Bayes theorem (optional this week)"
      datasets:
        - name: "health_survey"
          file: "data/health-survey.csv"
          description: "Survey data on exercise habits and health outcomes for two-way table exercises"
          size: "500 observations, 6 variables"
          source: "Simulated data"
      software:
        - name: "R"
          version: ">= 4.3.0"
          packages:
            - "dplyr"

    activities:
      - id: "A-2.1"
        type: group-discussion
        title: "Probability in the News"
        duration_minutes: 10
        description: "Each group examines a news headline involving probability or risk (pre-selected by instructor). Identify the sample space, events of interest, and any misinterpretations of probability in the article."
        learning_objectives:
          - "LO-2.1"
      - id: "A-2.2"
        type: in-class-practice
        title: "Applying Probability Rules"
        duration_minutes: 15
        description: "Worksheet with 8 problems requiring application of addition, multiplication, and complement rules. Students work individually, then check answers with a neighbor."
        learning_objectives:
          - "LO-2.2"
          - "LO-2.3"
      - id: "A-2.3"
        type: group-discussion
        title: "Two-Way Table Analysis"
        duration_minutes: 20
        description: "Using the health_survey dataset, groups construct a two-way table of exercise frequency vs. health rating. Calculate joint, marginal, and conditional probabilities. Discuss whether exercise and health appear independent."
        learning_objectives:
          - "LO-2.3"
          - "LO-2.4"
        materials:
          - "health_survey"

    assessments:
      - type: quiz
        id: "Q-1"
        title: "Descriptive Statistics Review Quiz"
        date: "2026-01-27"
        points: 10
        topics:
          - "T-1.1"
          - "T-1.2"
          - "T-1.3"
        learning_objectives:
          - "LO-1.1"
          - "LO-1.2"
          - "LO-1.3"
      - type: homework
        id: "HW-2"
        title: "Probability Fundamentals Practice"
        due_date: "2026-02-03"
        points: 20
        topics:
          - "T-2.1"
          - "T-2.2"
          - "T-2.3"
          - "T-2.4"
        learning_objectives:
          - "LO-2.1"
          - "LO-2.2"
          - "LO-2.3"
          - "LO-2.4"

    lecture_structure:
      - segment: review
        duration_minutes: 10
        content: "Quick recap of descriptive statistics; connect data summaries to probability questions"
        teaching_method: mini-lecture
      - segment: introduction
        duration_minutes: 15
        content: "Sample spaces, events, and basic probability definitions with dice and card examples"
        teaching_method: mini-lecture
      - segment: practice
        duration_minutes: 10
        content: "Probability in the News discussion (activity A-2.1)"
        teaching_method: socratic-discussion
      - segment: introduction
        duration_minutes: 15
        content: "Addition and multiplication rules with worked examples"
        teaching_method: mini-lecture
      - segment: example
        duration_minutes: 10
        content: "Worked example: computing P(A or B) and P(A and B) for medical screening data"
        teaching_method: instructor-demo
      - segment: practice
        duration_minutes: 15
        content: "Applying Probability Rules worksheet (activity A-2.2)"
        teaching_method: guided-practice
      - segment: break
        duration_minutes: 5
        content: "Short break"
      - segment: introduction
        duration_minutes: 10
        content: "Conditional probability and independence: definitions and intuition"
        teaching_method: mini-lecture
      - segment: demonstration
        duration_minutes: 10
        content: "Live walkthrough: building a two-way table from raw data in R"
        teaching_method: instructor-demo
      - segment: practice
        duration_minutes: 20
        content: "Two-Way Table Analysis group activity (activity A-2.3)"
        teaching_method: guided-practice
      - segment: wrap-up
        duration_minutes: 5
        content: "Key probability rules summary, preview of random variables next week"
        teaching_method: mini-lecture

    prerequisites:
      topics:
        - "T-1.1"
      skills:
        - "Summarizing data distributions"
        - "Reading frequency tables"

    prepares_for:
      topics:
        - "T-3.1"
        - "T-3.2"
      skills:
        - "Computing probabilities of events"
        - "Reasoning about conditional probability"

    metadata:
      created: "2026-01-22"
      updated: "2026-01-22"
      version: "1.0"
      author: "Scholar AI"
      status: generated
      tags:
        - "probability"
        - "conditional-probability"
        - "two-way-tables"

