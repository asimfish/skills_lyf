site_name: Scholar Plugin
site_description: Academic workflows for research and teaching - 33 commands for literature management, manuscript writing, simulation studies, and course material generation
site_url: https://data-wise.github.io/scholar/

repo_name: Data-Wise/scholar
repo_url: https://github.com/Data-Wise/scholar
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - macros

extra:
  scholar:
    version: "2.17.0"
    prev_version: "2.16.0"
    release_date: "2026-03-04"
    test_count: "3,340"
    jest_count: "3,203"
    node_test_count: "137"
    command_count: 33
    teaching_commands: 18
    research_commands: 14
    hub_commands: 1
    suite_count: 137

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

